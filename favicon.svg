<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="32" height="32" fill="#000000"/>
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#00FF41" stroke-width="1"/>
  <text x="16" y="17" font-family="monospace" font-size="18" font-weight="bold"
        fill="#00FF41" text-anchor="middle" dominant-baseline="central"
        filter="url(#glow)">&gt;_</text>
</svg>
