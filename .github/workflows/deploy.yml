name: Deploy to esdavis.dev

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/esdavis.dev/games
            git checkout js/main.js
            git pull origin main
            sed -i "s/const VERSION = '[^']*';/const VERSION = '${{ github.event.release.tag_name }}';/" js/main.js
