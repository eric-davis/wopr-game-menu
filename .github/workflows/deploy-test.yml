name: Deploy to test.esdavis.dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/test.esdavis.dev/games
            git checkout js/main.js
            git pull origin main
            sed -i "s/const VERSION = '[^']*';/const VERSION = 'dev';/" js/main.js
